<!DOCTYPE html>
<html>
<head>
    <title>Smart Farming Dashboard</title>

    <meta http-equiv="refresh" content="30">

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 15px auto;
            width: 80%;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .time {
            color: #666;
            font-size: 13px;
        }

        .confidence {
            color: #1a7f37;
            font-weight: bold;
            margin-top: 5px;
        }

        .result {
            margin-top: 10px;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 8px;

            /* ✅ FIX FOR FULL AI TEXT DISPLAY */
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-wrap: break-word;

            /* optional but makes it look clean */
            line-height: 1.5;
            font-size: 14px;

            /* scroll if very long */
            max-height: 350px;
            overflow-y: auto;
        }

        .empty {
            text-align: center;
            color: gray;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<h1>🌿 Smart Farming AI Dashboard</h1>

{% if logs and logs|length > 0 %}

    {% for log in logs|reverse %}
    <div class="card">
        <div class="time">⏰ {{ log.time }}</div>
        <div class="confidence">📊 Confidence: {{ log.confidence }}</div>
        <div class="result">{{ log.result }}</div>
    </div>
    {% endfor %}

{% else %}

    <div class="empty">
        No data yet. Run ESP32 scan first.
    </div>

{% endif %}

</body>
</html>
